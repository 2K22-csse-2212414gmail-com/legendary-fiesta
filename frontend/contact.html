<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 50px 40px;
  max-width: 600px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  animation: slideUp 0.6s ease-out;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h2 {
  color: #333;
  font-size: 32px;
  margin-bottom: 10px;
  font-weight: 600;
}

.subtitle {
  color: #666;
  margin-bottom: 35px;
  font-size: 16px;
}

.form-group {
  margin-bottom: 25px;
}

label {
  display: block;
  color: #444;
  font-weight: 500;
  margin-bottom: 8px;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

input[type=text], 
input[type=email], 
textarea {
  width: 100%;
  padding: 15px 18px;
  border: 2px solid #e0e0e0;
  border-radius: 10px;
  font-size: 16px;
  font-family: inherit;
  transition: all 0.3s ease;
  background: #fff;
}

input[type=text]:focus, 
input[type=email]:focus, 
textarea:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
  transform: translateY(-2px);
}

textarea {
  resize: vertical;
  min-height: 150px;
}

input[type=submit] {
  width: 100%;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 16px 20px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 10px;
}

input[type=submit]:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
}

input[type=submit]:active {
  transform: translateY(-1px);
}

#responseMsg {
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  font-weight: 500;
  display: none;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

#responseMsg.success {
  background: #d4edda;
  color: #155724;
  border: 1px solid #c3e6cb;
  display: block;
}

#responseMsg.error {
  background: #f8d7da;
  color: #721c24;
  border: 1px solid #f5c6cb;
  display: block;
}

@media (max-width: 600px) {
  .container {
    padding: 35px 25px;
  }
  
  h2 {
    font-size: 26px;
  }
}
</style>
</head>
<body>

<div class="container">
  <h2>Get In Touch</h2>
  <p class="subtitle">We'd love to hear from you. Send us a message!</p>
  
  <form id="contactForm">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="John Doe" required>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="john@example.com" required>
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Tell us what's on your mind..." required></textarea>
    </div>

    <input type="submit" value="Send Message">
  </form>
  
  <div id="responseMsg"></div>
</div>

<script>
document.getElementById("contactForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  
  const submitBtn = this.querySelector('input[type=submit]');
  const responseMsg = document.getElementById("responseMsg");
  const originalBtnText = submitBtn.value;
  
  submitBtn.value = "Sending...";
  submitBtn.disabled = true;
  responseMsg.className = "";
  responseMsg.style.display = "none";

  const formData = {
    name: this.name.value,
    email: this.email.value,
    message: this.message.value
  };

  try {
    const res = await fetch("http://localhost:5000/contact", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(formData)
    });

    const data = await res.json();
    
    if (res.ok) {
      responseMsg.className = "success";
      responseMsg.innerText = data.message || "Thank you! Your message has been sent successfully.";
      this.reset();
    } else {
      responseMsg.className = "error";
      responseMsg.innerText = data.message || "Something went wrong. Please try again.";
    }

  } catch(err) {
    console.error(err);
    responseMsg.className = "error";
    responseMsg.innerText = "Failed to connect to server. Please check your connection and try again.";
  } finally {
    submitBtn.value = originalBtnText;
    submitBtn.disabled = false;
  }
});
</script>

</body>
</html>
